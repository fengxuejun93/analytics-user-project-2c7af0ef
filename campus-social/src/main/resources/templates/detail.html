<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态详情 - 校内网</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">校内网</a>
            <div class="nav-links">
                <a href="/">动态广场</a>
                <a href="/post/publish">发布动态</a>
                <a th:href="@{'/user/' + ${currentUser.id}}">我的主页</a>
                <a href="/monitor/index.html">管理中心</a>
                <a href="/warehouse/index.html">仓储管理</a>
            </div>
            <div class="nav-user" th:if="${currentUser}">
                <img class="nav-avatar" th:src="${currentUser.avatar}" th:alt="${currentUser.realName}">
                <span th:text="${currentUser.realName}"></span>
            </div>
        </div>
    </nav>

    <!-- Toast 通知 -->
    <div th:if="${toastMsg != null and !toastMsg.isEmpty()}" class="toast"
         th:class="${toastType == 'success'} ? 'toast toast-success show' : 'toast toast-error show'">
        <span th:text="${toastMsg}"></span>
    </div>

    <main class="container">
        <div class="detail-layout">
            <div class="detail-main">
                <a href="/" class="back-link">&larr; 返回动态广场</a>

                <!-- ====== 查看模式 ====== -->
                <div id="viewMode">
                    <div class="card detail-card">
                        <!-- 发布者信息 -->
                        <div class="post-header">
                            <a th:href="@{'/user/' + ${author.id}}" class="post-user">
                                <img class="avatar" th:src="${author.avatar}" th:alt="${author.realName}">
                                <div class="post-user-info">
                                    <span class="post-name" th:text="${author.realName}"></span>
                                    <span class="post-school" th:text="${author.school + ' ' + author.className}"></span>
                                </div>
                            </a>
                            <div class="post-meta-tags">
                                <span th:if="${post.pinned}" class="pin-badge">置顶</span>
                                <span class="visibility-tag" th:class="'visibility-tag vis-' + ${post.visibility.name()}"
                                      th:text="${post.visibility.label}"></span>
                            </div>
                        </div>

                        <!-- 动态内容 -->
                        <p class="post-content" th:text="${post.content}"></p>
                        <div class="detail-image-wrap" th:if="${post.imageUrl}">
                            <img class="detail-image" th:src="${post.imageUrl}" alt="动态大图">
                        </div>

                        <!-- 时间 + 编辑标记 -->
                        <div class="post-time-row">
                            <span class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                            <span th:if="${post.edited}" class="edited-hint">
                                已编辑 <span th:text="${#temporals.format(post.lastEditedAt, 'yyyy-MM-dd HH:mm')}"></span>
                            </span>
                        </div>

                        <!-- 互动栏 -->
                        <div class="detail-interactions">
                            <div class="detail-actions">
                                <form method="post" th:action="@{'/post/' + ${post.id} + '/like'}" style="display:inline">
                                    <button type="submit" class="btn-action"
                                            th:class="${post.isLikedBy(currentUser.id)} ? 'btn-action liked' : 'btn-action'">
                                        <span th:text="${post.likeCount}"></span> 赞
                                    </button>
                                </form>
                                <form method="post" th:action="@{'/post/' + ${post.id} + '/bookmark'}" style="display:inline">
                                    <button type="submit" class="btn-action"
                                            th:class="${post.isBookmarkedBy(currentUser.id)} ? 'btn-action bookmarked' : 'btn-action'">
                                        <span th:text="${post.bookmarkCount}"></span> 收藏
                                    </button>
                                </form>
                                <span class="action-item">
                                    <span th:text="${commentCount}"></span> 评论
                                </span>
                            </div>
                            <!-- 主人操作 -->
                            <div th:if="${isOwner}" class="owner-actions">
                                <a th:href="@{'/post/' + ${post.id} + '/edit'}" class="btn-action">编辑</a>
                                <button type="button" class="btn-action" th:text="${post.pinned} ? '取消置顶' : '置顶'"
                                        onclick="showConfirm('pin')"></button>
                                <button type="button" class="btn-action btn-action-danger" onclick="showConfirm('delete')">删除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ====== 页面内确认层 ====== -->
                <div id="confirmPanel" class="confirm-panel" style="display:none">
                    <h4 id="confirmTitle"></h4>
                    <p id="confirmDesc"></p>
                    <div class="confirm-actions">
                        <button class="btn btn-danger" id="confirmBtn" onclick="doConfirm()">确认</button>
                        <button class="btn" onclick="hideConfirm()">取消</button>
                    </div>
                </div>
                <!-- 隐藏的提交表单 -->
                <form id="pinForm" method="post" th:action="@{'/post/' + ${post.id} + '/pin'}" style="display:none"></form>
                <form id="deleteForm" method="post" th:action="@{'/post/' + ${post.id} + '/delete'}" style="display:none"></form>

                <!-- ====== 评论列表 ====== -->
                <div class="card comments-card">
                    <h3 class="section-title">评论 (<span th:text="${commentCount}"></span>)</h3>

                    <div th:if="${comments.isEmpty()}" class="empty-hint">
                        <div class="empty-icon">&#128172;</div>
                        暂无评论，来说两句吧
                    </div>

                    <div th:each="comment : ${comments}" class="comment-item">
                        <div class="comment-main">
                            <a th:href="@{'/user/' + ${comment.userId}}" class="comment-user">
                                <img class="avatar-sm" th:src="${userMap.get(comment.userId).avatar}" th:alt="${userMap.get(comment.userId).realName}">
                                <span class="comment-name" th:text="${userMap.get(comment.userId).realName}"></span>
                            </a>
                            <span class="comment-text" th:text="${comment.content}"></span>
                            <span class="comment-time" th:text="${#temporals.format(comment.createdAt, 'MM-dd HH:mm')}"></span>
                            <span th:if="${comment.userId == currentUser.id}">
                                <button type="button" class="btn-delete-comment" title="删除评论"
                                        th:attr="onclick='showDelComment('+${comment.id}+')'">&times;</button>
                            </span>
                            <span th:id="'del-confirm-' + ${comment.id}" style="display:none" class="confirm-inline">
                                确定删除该评论？
                                <form method="post" th:action="@{'/post/comment/' + ${comment.id} + '/delete'}" style="display:inline">
                                    <input type="hidden" name="postId" th:value="${post.id}">
                                    <button type="submit" class="btn btn-danger">删除</button>
                                </form>
                                <button type="button" class="btn" th:attr="onclick='hideDelComment('+${comment.id}+')'">取消</button>
                            </span>
                        </div>

                        <!-- 楼中楼回复 -->
                        <div th:if="${!comment.replies.isEmpty()}" class="replies">
                            <div th:each="reply : ${comment.replies}" class="reply-item">
                                <a th:href="@{'/user/' + ${reply.userId}}" class="comment-user">
                                    <img class="avatar-xs" th:src="${userMap.get(reply.userId).avatar}" th:alt="${userMap.get(reply.userId).realName}">
                                    <span class="reply-name" th:text="${userMap.get(reply.userId).realName}"></span>
                                </a>
                                <span class="reply-text" th:text="${reply.content}"></span>
                                <span class="comment-time" th:text="${#temporals.format(reply.createdAt, 'MM-dd HH:mm')}"></span>
                            </div>
                        </div>

                        <!-- 回复表单 -->
                        <div class="reply-form-wrap">
                            <form method="post" th:action="@{'/post/comment/' + ${comment.id} + '/reply'}" class="reply-form">
                                <input type="hidden" name="postId" th:value="${post.id}">
                                <input type="text" name="content" placeholder="回复..." class="input-sm" required>
                                <button type="submit" class="btn-sm btn-primary">回复</button>
                            </form>
                        </div>
                    </div>

                    <!-- 发评论表单 -->
                    <div class="comment-form-section">
                        <h4>发表评论</h4>
                        <form method="post" th:action="@{'/post/' + ${post.id} + '/comment'}" class="comment-form">
                            <textarea name="content" placeholder="说点什么吧..." class="textarea-input" rows="3" required></textarea>
                            <button type="submit" class="btn btn-primary">发表评论</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>校内网社交原型 - 本地模拟数据演示</p>
    </footer>

    <script>
        // ===== 确认层（删除动态/置顶） =====
        var pendingAction = null;
        function showConfirm(action) {
            var panel = document.getElementById('confirmPanel');
            var title = document.getElementById('confirmTitle');
            var desc = document.getElementById('confirmDesc');
            var btn = document.getElementById('confirmBtn');
            if (action === 'delete') {
                title.textContent = '确认删除动态';
                desc.textContent = '删除后无法恢复，评论和点赞也会一起清除。';
                btn.className = 'btn btn-danger';
                btn.textContent = '确认删除';
            } else if (action === 'pin') {
                var isPinned = /*[[${post.pinned}]]*/ false;
                title.textContent = isPinned ? '取消置顶' : '确认置顶';
                desc.textContent = isPinned ? '取消后该动态将不再固定在顶部。' : '置顶后该动态将固定在动态广场顶部。';
                btn.className = 'btn btn-primary';
                btn.textContent = '确认';
            }
            pendingAction = action;
            panel.style.display = 'block';
        }
        function hideConfirm() {
            document.getElementById('confirmPanel').style.display = 'none';
            pendingAction = null;
        }
        function doConfirm() {
            if (pendingAction === 'delete') {
                document.getElementById('deleteForm').submit();
            } else if (pendingAction === 'pin') {
                document.getElementById('pinForm').submit();
            }
        }

        // ===== 删除评论确认层 =====
        function showDelComment(id) {
            var el = document.getElementById('del-confirm-' + id);
            if (el) el.style.display = 'inline-flex';
        }
        function hideDelComment(id) {
            var el = document.getElementById('del-confirm-' + id);
            if (el) el.style.display = 'none';
        }

        // Toast 自动消失
        setTimeout(function() {
            var toast = document.querySelector('.toast.show');
            if (toast) toast.classList.remove('show');
        }, 3000);
    </script>
</body>
</html>
