<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 - 校内网</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">校内网</a>
            <div class="nav-links">
                <a href="/">动态广场</a>
                <a href="/post/publish">发布动态</a>
                <a th:href="@{'/user/' + ${currentUser.id}}" class="active">我的主页</a>
            </div>
            <div class="nav-user" th:if="${currentUser}">
                <img class="nav-avatar" th:src="${currentUser.avatar}" th:alt="${currentUser.realName}">
                <span th:text="${currentUser.realName}"></span>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="profile-layout">
            <!-- 左侧个人资料 -->
            <aside class="sidebar">
                <div class="card profile-info-card">
                    <div class="profile-avatar-wrap">
                        <img class="avatar-xl" th:src="${profileUser.avatar}" th:alt="${profileUser.realName}">
                    </div>
                    <h2 class="profile-name" th:text="${profileUser.realName}"></h2>
                    <p class="profile-school" th:text="${profileUser.school}"></p>
                    <p class="profile-class" th:text="${profileUser.className}"></p>
                    <div class="profile-details">
                        <p th:if="${profileUser.gender}"><span class="label">性别：</span><span th:text="${profileUser.gender}"></span></p>
                        <p th:if="${profileUser.birthday}"><span class="label">生日：</span><span th:text="${#temporals.format(profileUser.birthday, 'yyyy-MM-dd')}"></span></p>
                        <p th:if="${profileUser.bio}"><span class="label">签名：</span><span th:text="${profileUser.bio}"></span></p>
                    </div>

                    <!-- 好友操作按钮 -->
                    <div class="friend-action-area" th:if="${friendStatus != 'self'}">
                        <div th:switch="${friendStatus}">
                            <span th:case="'friend'" class="friend-badge">已是好友</span>
                            <form th:case="'none'" method="post" th:action="@{'/friend/request/' + ${profileUser.id}}">
                                <button type="submit" class="btn btn-primary btn-block">加为好友</button>
                            </form>
                            <span th:case="'sent'" class="pending-badge">已发送申请，等待对方通过</span>
                            <div th:case="'received'" class="received-actions">
                                <p class="pending-badge">对方已发来好友申请</p>
                                <form method="post" th:action="@{'/friend/accept/' + ${relation.id}}" style="display:inline">
                                    <input type="hidden" name="redirect" th:value="'/user/' + ${profileUser.id}">
                                    <button type="submit" class="btn btn-primary">通过</button>
                                </form>
                                <form method="post" th:action="@{'/friend/reject/' + ${relation.id}}" style="display:inline">
                                    <input type="hidden" name="redirect" th:value="'/user/' + ${profileUser.id}">
                                    <button type="submit" class="btn btn-danger">拒绝</button>
                                </form>
                            </div>
                            <span th:case="'rejected'" class="rejected-badge">申请已被拒绝</span>
                        </div>
                    </div>
                </div>

                <!-- 统计区 -->
                <div class="card">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-num" th:text="${friendCount}">0</span>
                            <span class="stat-label">好友</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" th:text="${pendingRequestCount}">0</span>
                            <span class="stat-label">待处理申请</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" th:text="${visiblePostCount}">0</span>
                            <span class="stat-label">可见动态</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" th:text="${photoPostCount}">0</span>
                            <span class="stat-label">照片动态</span>
                        </div>
                    </div>
                </div>

                <!-- 好友列表 -->
                <div class="card" th:if="${!friends.isEmpty()}">
                    <div class="card-title">好友 (<span th:text="${friends.size()}"></span>)</div>
                    <div class="friend-list">
                        <a th:each="f : ${friends}" th:href="@{'/user/' + ${f.id}}" class="friend-item">
                            <img class="avatar-sm" th:src="${f.avatar}" th:alt="${f.realName}">
                            <span th:text="${f.realName}"></span>
                        </a>
                    </div>
                </div>
            </aside>

            <!-- 右侧动态摘要 -->
            <section class="profile-main">
                <h3 class="section-title" th:text="${profileUser.realName} + '的动态'"></h3>
                <div th:each="post : ${userPosts}" class="card post-card">
                    <div class="post-header">
                        <a th:href="@{'/user/' + ${post.userId}}" class="post-user">
                            <img class="avatar" th:src="${userMap.get(post.userId).avatar}" th:alt="${userMap.get(post.userId).realName}">
                            <div class="post-user-info">
                                <span class="post-name" th:text="${userMap.get(post.userId).realName}"></span>
                                <span class="post-school" th:text="${userMap.get(post.userId).school + ' ' + userMap.get(post.userId).className}"></span>
                            </div>
                        </a>
                        <span class="visibility-tag" th:class="'visibility-tag vis-' + ${post.visibility.name()}"
                              th:text="${post.visibility.label}"></span>
                    </div>
                    <a th:href="@{'/post/' + ${post.id}}" class="post-content-link">
                        <p class="post-content" th:text="${post.content}"></p>
                        <div class="post-image-wrap" th:if="${post.imageUrl}">
                            <img class="post-image" th:src="${post.imageUrl}" alt="动态照片">
                        </div>
                    </a>
                    <div class="post-footer">
                        <span class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                        <div class="post-actions">
                            <span class="action-item"><span th:text="${post.likeCount}"></span> 赞</span>
                            <span class="action-item"><span th:text="${commentCountMap.get(post.id)}"></span> 评论</span>
                        </div>
                    </div>
                </div>

                <div th:if="${userPosts.isEmpty()}" class="card empty-card">
                    <p>暂无可见动态</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <p>校内网社交原型 - 本地模拟数据演示</p>
    </footer>
</body>
</html>
